name: Main Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'sapmachine'
          java-version: '25'
          cache: 'maven'

      # Compute a unique Maven/Docker/Release version for every main build.
      # GitHub Packages (Maven) rejects re-deploying the same release version
      # with 409 Conflict, so each push to main must publish a fresh coordinate.
      # Scheme: `<pom.version>-b<run_number>` (e.g. 1.1.0-b42) — preserves the
      # semantic base version from pom.xml while giving every build a stable,
      # monotonically increasing suffix.
      - name: Set Version
        id: version
        run: |
          POM_VERSION=$(grep -m1 '<version>' pom.xml | sed -E 's#.*<version>([^<]+)</version>.*#\1#')
          VERSION="${POM_VERSION}-b${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: ${VERSION}"

      - name: Stamp pom.xml with build version
        run: mvn -B -ntp versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build Package
        run: mvn clean package -DskipTests

      - name: Publish Artifact to GitHub Packages
        run: mvn deploy -s .github/mvn/settings.xml -DskipTests
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repository Name
        id: repo_name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.REPO }}:latest
            ghcr.io/${{ steps.repo_name.outputs.REPO }}:v${{ steps.version.outputs.VERSION }}

      - name: Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.VERSION }}
          git push origin v${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true