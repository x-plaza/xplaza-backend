spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:xplaza;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS xplaza
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        default_schema: xplaza
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200

server:
  port: 8080

# NOTE: For production, use a secure random secret of at least 256 bits (32+ characters)
# Generate with: openssl rand -base64 32
jwt:
  secret: xplaza-local-dev-secret-key-change-in-production-2024-do-not-use-in-prod
  expiration: 900000          # 15 minutes
  refresh-expiration: 604800000  # 7 days

xplaza:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000

management:
  tracing:
    sampling:
      probability: 1.0
