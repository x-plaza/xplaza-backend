stripe:
  api-key: test-stripe-api-key
  webhook-secret: test-stripe-webhook-secret

spring:
  profiles:
    active: local
  # Disable Hibernate Envers in tests: H2 (even in PostgreSQL mode) does not
  # accept TINYINT, which Envers uses for the `revtype` column on every _AUD
  # table. Production runs against Postgres where TINYINT is unnecessary.
  jpa:
    properties:
      hibernate:
        integration:
          envers:
            enabled: false
  mail:
    username: test-email-user
    password: test-email-password
  elasticsearch:
    uris: http://localhost:9200
  data:
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.data.elasticsearch.autoconfigure.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.data.elasticsearch.autoconfigure.ElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration
      - org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.elasticsearch.autoconfigure.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.tracing.OpenTelemetryTracingAutoConfiguration

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: xplaza-products-test

# Disable optional integrations during unit/integration tests so the context
# can boot without external services.
search:
  elasticsearch:
    enabled: false

management:
  tracing:
    sampling:
      probability: 0.0

telesign:
  customer-id: ""
  api-key: ""
